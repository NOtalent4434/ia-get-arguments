# ia-get configuration file
# Place this file in the current working directory or in your user config directory:
#   Windows: %APPDATA%\ia-get\ia-get.ini
#   Linux/macOS: ~/.config/ia-get/ia-get.ini

# Maximum download speed in kilobytes per second (KB/s).
# Values are in KB/s (1024 bytes), not kilobits.
#   -1  = unlimited (default, use full available bandwidth)
# 4000  = cap at ~4 MB/s (4000 KB/s)
#  500  = cap at ~500 KB/s
maxbandwidth = -1

# Enable parallel downloads of multiple files at once.
# When false (default), files are downloaded one at a time.
multithreading = false

# Number of concurrent file downloads when multithreading is enabled.
# Only used when multithreading = true. Default: 4
threads = 4
